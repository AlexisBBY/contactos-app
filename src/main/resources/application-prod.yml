spring:
  datasource:
    # Reemplaza 'postgresql://' por 'jdbc:postgresql://'
    url: jdbc:${DATABASE_URL/postgresql:/jdbc:postgresql:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

server:
  port: ${PORT:8080}

app:
  upload:
    dir: /tmp/uploads/