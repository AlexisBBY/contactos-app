spring:
  datasource:
    # Render provee: postgresql://user:pass@host/db
    # Spring necesita: jdbc:postgresql://user:pass@host/db
    url: jdbc:${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

server:
  port: ${PORT:8080}

app:
  upload:
    dir: /tmp/uploads/