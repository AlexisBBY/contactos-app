<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Directorio de Contactos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f1f3f6; color: #333; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: #fff; border-bottom: 1px solid #dde1e7; padding: 0 32px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 8px; color: #222; }
    header h1 span { font-size: 1.4rem; }
    main { flex: 1; padding: 32px; max-width: 1100px; margin: 0 auto; width: 100%; }
    footer { text-align: center; padding: 16px; font-size: 0.8rem; color: #888; background: #fff; border-top: 1px solid #eee; }
    footer a { color: #5b5ef4; text-decoration: none; }

    /* Botones */
    .btn { padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: background 0.2s; }
    .btn-primary { background: #5b5ef4; color: #fff; }
    .btn-primary:hover { background: #4749c8; }
    .btn-success { background: #1a9e5c; color: #fff; }
    .btn-success:hover { background: #147a46; }
    .btn-sm { padding: 5px 10px; font-size: 0.8rem; }
    .btn-edit { background: #e8f0fe; color: #1a73e8; border: 1px solid #c5d3f0; }
    .btn-edit:hover { background: #c5d3f0; }
    .btn-delete { background: #fde8e8; color: #c0392b; border: 1px solid #f0c5c5; }
    .btn-delete:hover { background: #f0c5c5; }

    /* Vista */
    #view-list, #view-form { display: none; }
    #view-list.active, #view-form.active { display: block; }

    /* Filtros */
    .filters { background: #fff; border-radius: 10px; padding: 16px 20px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 12px; border: 1px solid #e2e5eb; }
    .filters input { flex: 1; min-width: 150px; padding: 8px 12px; border: 1px solid #dde1e7; border-radius: 6px; font-size: 0.88rem; }
    .filters input:focus { outline: 2px solid #5b5ef4; border-color: transparent; }

    /* Tabla */
    .table-wrapper { background: #fff; border-radius: 10px; overflow: hidden; border: 1px solid #e2e5eb; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: #1a1a2e; color: #fff; }
    th, td { padding: 12px 14px; text-align: left; font-size: 0.88rem; }
    tbody tr { border-bottom: 1px solid #f0f2f5; }
    tbody tr:hover { background: #f7f9ff; }
    .foto-thumb { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #e0e4ee; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; overflow: hidden; }
    .foto-thumb img { width: 100%; height: 100%; object-fit: cover; }

    /* Paginación */
    .pagination { margin-top: 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .pagination-info { font-size: 0.84rem; color: #666; }
    .pagination-btns { display: flex; gap: 6px; }
    .page-btn { padding: 5px 11px; border: 1px solid #dde1e7; border-radius: 5px; background: #fff; cursor: pointer; font-size: 0.84rem; }
    .page-btn.active { background: #5b5ef4; color: #fff; border-color: #5b5ef4; }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Formulario */
    .form-card { background: #fff; border-radius: 12px; padding: 36px 40px; border: 1px solid #e2e5eb; max-width: 800px; margin: 0 auto; }
    .form-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .form-header h2 { font-size: 1.3rem; display: flex; align-items: center; gap: 10px; color: #222; }
    .form-header h2 span { font-size: 1.5rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .form-row.full { grid-template-columns: 1fr; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 0.88rem; font-weight: 600; color: #444; }
    .form-group input { padding: 10px 14px; border: 1px solid #dde1e7; border-radius: 7px; font-size: 0.9rem; transition: border 0.2s; }
    .form-group input:focus { outline: none; border-color: #5b5ef4; box-shadow: 0 0 0 3px rgba(91,94,244,0.1); }
    .form-group input.error { border-color: #e74c3c; }
    .error-msg { font-size: 0.78rem; color: #e74c3c; margin-top: 2px; }
    .edad-info { font-size: 0.8rem; color: #666; margin-top: 4px; }
    .btn-guardar { width: 100%; padding: 14px; margin-top: 8px; font-size: 1rem; border-radius: 8px; }

    /* Toast */
    #toast { position: fixed; bottom: 28px; right: 28px; background: #222; color: #fff; padding: 12px 22px; border-radius: 8px; font-size: 0.9rem; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 9999; }
    #toast.show { opacity: 1; }
    #toast.success { background: #1a9e5c; }
    #toast.error { background: #c0392b; }

    /* Modal confirmar */
    #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 999; align-items: center; justify-content: center; }
    #modal-overlay.show { display: flex; }
    .modal-box { background: #fff; padding: 28px 32px; border-radius: 12px; max-width: 360px; text-align: center; }
    .modal-box h3 { margin-bottom: 10px; }
    .modal-box p { color: #666; margin-bottom: 20px; font-size: 0.9rem; }
    .modal-btns { display: flex; gap: 12px; justify-content: center; }
  </style>
</head>
<body>

<header>
  <h1><span>👤</span> Directorio</h1>
</header>

<main>
  <!-- Vista Lista -->
  <div id="view-list">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h2 style="font-size:1.4rem;display:flex;align-items:center;gap:8px;"><span>📋</span> Directorio</h2>
      <button class="btn btn-success" onclick="mostrarFormulario()">+ Nuevo Contacto</button>
    </div>
    <div class="filters">
      <input type="text" id="f-nombre" placeholder="Buscar por nombre..." oninput="filtrar()" maxlength="100"/>
      <input type="text" id="f-correo" placeholder="Correo..." oninput="filtrar()" maxlength="150"/>
      <input type="text" id="f-telefono" placeholder="Teléfono..." oninput="filtrar()" maxlength="10"/>
      <input type="text" id="f-cp" placeholder="CP..." oninput="filtrar()" maxlength="10"/>
      <input type="date" id="f-fecha" oninput="filtrar()"/>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Foto</th><th>Nombre</th><th>Correo</th>
            <th>Teléfono</th><th>CP</th><th>Nacimiento</th><th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-body">
          <tr><td colspan="7" style="text-align:center;padding:24px;color:#999;">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination">
      <span class="pagination-info" id="pag-info"></span>
      <div class="pagination-btns" id="pag-btns"></div>
    </div>
  </div>

  <!-- Vista Formulario -->
  <div id="view-form">
    <div class="form-card">
      <div class="form-header">
        <h2><span>🧑‍💼</span> <span id="form-titulo">Nuevo Contacto</span></h2>
        <button class="btn btn-edit btn-sm" onclick="mostrarLista()">Ver Lista</button>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" id="inp-nombre" placeholder="Nombre" maxlength="100" oninput="validarCampo(this,'nombre')"/>
          <span class="error-msg" id="err-nombre"></span>
        </div>
        <div class="form-group">
          <label>Apellidos</label>
          <input type="text" id="inp-apellidos" placeholder="Apellidos" maxlength="100" oninput="validarCampo(this,'apellidos')"/>
          <span class="error-msg" id="err-apellidos"></span>
        </div>
      </div>
      <div class="form-row full">
        <div class="form-group">
          <label>Correo Electrónico</label>
          <input type="email" id="inp-correo" placeholder="correo@ejemplo.com" maxlength="150" oninput="validarCampo(this,'correo')"/>
          <span class="error-msg" id="err-correo"></span>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Teléfono (10 dígitos)</label>
          <input type="tel" id="inp-telefono" placeholder="5512345678" maxlength="10" oninput="soloNumeros(this);validarCampo(this,'telefono')"/>
          <span class="error-msg" id="err-telefono"></span>
        </div>
        <div class="form-group">
          <label>Código Postal</label>
          <input type="text" id="inp-cp" placeholder="12345" maxlength="10" oninput="soloNumeros(this);validarCampo(this,'codigoPostal')"/>
          <span class="error-msg" id="err-codigoPostal"></span>
        </div>
      </div>
      <div class="form-row full">
        <div class="form-group">
          <label>Fecha de Nacimiento</label>
          <input type="date" id="inp-fecha" oninput="calcularEdad();validarCampo(this,'fechaNacimiento')"/>
          <span class="edad-info" id="edad-info">Edad: —</span>
          <span class="error-msg" id="err-fechaNacimiento"></span>
        </div>
      </div>
      <div class="form-row full">
        <div class="form-group">
          <label>Foto de Perfil</label>
          <input type="file" id="inp-foto" accept="image/jpeg,image/png,image/gif,image/webp" onchange="validarFoto(this)"/>
          <span class="error-msg" id="err-foto"></span>
        </div>
      </div>
      <button class="btn btn-primary btn-guardar" onclick="guardar()" id="btn-guardar">Guardar Registro</button>
    </div>
  </div>
</main>

<footer>© 2026 - App1 - <a href="#">Privacy</a></footer>

<div id="toast"></div>

<div id="modal-overlay">
  <div class="modal-box">
    <h3>¿Eliminar contacto?</h3>
    <p>Esta acción no se puede deshacer.</p>
    <div class="modal-btns">
      <button class="btn btn-edit" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-delete" onclick="confirmarEliminar()">Eliminar</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
